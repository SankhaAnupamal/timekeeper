<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Time Keeper</title>
    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100dvh;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: #0d1829;
            background: radial-gradient(ellipse at 20% 30%, #162a44, #0a121f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px;
            color: #e8edf5;
            touch-action: manipulation;
        }

        /* ── Card ── */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 20px 18px 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            min-height: 44px;
            min-width: 44px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.3);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 0.75rem;
            color: #7a8fb0;
            margin-top: 1px;
            font-weight: 400;
        }

        /* ── Schedule Reference (shows 8:15 AM / 5:00 PM) ── */
        .schedule-ref {
            background: rgba(59, 130, 246, 0.07);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 20px;
        }

        .schedule-ref-title {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #60a5fa;
            text-align: center;
            margin-bottom: 8px;
        }

        .schedule-grid {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            flex-wrap: wrap;
        }

        .time-pill {
            flex: 1 1 0;
            min-width: 56px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 6px 4px;
        }

        .time-pill .label {
            font-size: 0.55rem;
            font-weight: 600;
            color: #6a7f9e;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .time-pill .value {
            font-size: clamp(0.75rem, 2.6vw, 0.95rem);
            font-weight: 700;
            color: #e2e8f0;
        }

        .schedule-arrow {
            color: #3a5070;
            font-size: 1rem;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .duration-pill {
            flex: 1 1 0;
            min-width: 64px;
            text-align: center;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 12px;
            padding: 6px 4px;
        }

        .duration-pill .label {
            font-size: 0.55rem;
            font-weight: 600;
            color: #8b9cf7;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .duration-pill .value {
            font-size: clamp(0.75rem, 2.6vw, 0.95rem);
            font-weight: 700;
            color: #c7d2fe;
        }

        /* ── Input ── */
        .input-section {
            margin-bottom: 20px;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-label span {
            font-size: clamp(0.78rem, 2.6vw, 0.88rem);
            font-weight: 600;
            color: #cbd5e1;
        }

        .input-hint {
            font-size: 0.6rem;
            font-weight: 600;
            color: #4a6a8a;
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .time-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .time-input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #60a5fa;
            pointer-events: none;
            z-index: 2;
            opacity: 0.8;
        }

        input[type="time"] {
            width: 100%;
            height: 56px;
            min-height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0 12px 0 46px;
            color: #f1f5f9;
            font-size: clamp(1rem, 3.6vw, 1.3rem);
            font-weight: 700;
            font-family: inherit;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            cursor: pointer;
            letter-spacing: 0.3px;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.4);
            cursor: pointer;
            padding: 6px;
            margin-right: 2px;
            min-height: 30px;
            min-width: 30px;
        }

        input[type="time"]::-moz-calendar-picker {
            filter: invert(1) opacity(0.4);
        }

        input[type="time"]:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(96, 165, 250, 0.3);
        }

        input[type="time"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: rgba(255, 255, 255, 0.08);
        }

        input[type="time"]::-webkit-inner-spin-button,
        input[type="time"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
        }

        /* ── Result ── */
        .result-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 18px 14px 16px;
            text-align: center;
            transition: border-color 0.4s, background 0.4s;
            position: relative;
            overflow: hidden;
        }

        .result-card.on-time {
            border-color: rgba(34, 197, 94, 0.25);
            background: rgba(34, 197, 94, 0.04);
        }

        .result-card.late {
            border-color: rgba(251, 146, 60, 0.25);
            background: rgba(251, 146, 60, 0.04);
        }

        .result-out-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a6a8a;
            margin-bottom: 4px;
        }

        .result-out-time {
            font-size: clamp(2.4rem, 9vw, 3.4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .result-out-time.on-time {
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-out-time.late {
            background: linear-gradient(135deg, #fb923c, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-out-time.placeholder {
            -webkit-text-fill-color: #3a5070;
            background: none;
            color: #3a5070;
            opacity: 0.6;
            font-weight: 400;
            letter-spacing: 0;
        }

        .result-out-time .meridiem {
            font-size: 0.45em;
            font-weight: 600;
            opacity: 0.7;
            margin-left: 2px;
        }

        /* ── Status Badge ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: clamp(0.7rem, 2.4vw, 0.8rem);
            font-weight: 700;
            margin-bottom: 12px;
            min-height: 38px;
            touch-action: manipulation;
            user-select: none;
        }

        .status-badge.on-time {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .status-badge.late {
            background: rgba(251, 146, 60, 0.1);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.15);
        }

        /* ── Message ── */
        .result-message {
            font-size: clamp(0.75rem, 2.4vw, 0.85rem);
            color: #94a3b8;
            line-height: 1.5;
            min-height: 2.4em;
            transition: color 0.3s;
            padding: 0 4px;
        }

        /* ── Duration Info ── */
        .duration-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            color: #4a6a8a;
            flex-wrap: wrap;
        }

        .duration-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 3px 12px;
            color: #94a3b8;
            font-weight: 600;
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            min-height: 28px;
            display: inline-flex;
            align-items: center;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: clamp(0.65rem, 2vw, 0.78rem);
            color: #2a4060;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 4px 0;
        }

        .footer .dev {
            font-weight: 600;
            background: linear-gradient(135deg, #7a9abb, #a0b8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer .heart {
            color: #f43f5e;
            font-size: clamp(0.75rem, 2.2vw, 0.85rem);
            animation: pulse 1.6s infinite;
            -webkit-text-fill-color: #f43f5e;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        /* ── Mobile Fine-Tune ── */
        @media (max-width: 420px) {
            .card {
                padding: 16px 14px 20px;
                border-radius: 22px;
            }

            .header-icon {
                width: 42px;
                height: 42px;
                font-size: 20px;
                border-radius: 14px;
            }

            .header-text h1 {
                font-size: 1.2rem;
            }

            .schedule-ref {
                padding: 10px 10px;
                border-radius: 14px;
            }

            .time-pill,
            .duration-pill {
                padding: 4px 2px;
            }

            .time-pill .value,
            .duration-pill .value {
                font-size: clamp(0.7rem, 2.4vw, 0.8rem);
            }

            input[type="time"] {
                height: 50px;
                min-height: 44px;
                padding: 0 10px 0 42px;
                font-size: clamp(0.9rem, 3.4vw, 1rem);
                border-radius: 14px;
            }

            .time-input-wrapper .input-icon {
                left: 12px;
                font-size: 16px;
            }

            .result-card {
                padding: 14px 10px 12px;
                border-radius: 16px;
            }

            .result-out-time {
                font-size: clamp(2rem, 8vw, 2.6rem);
            }

            .status-badge {
                padding: 4px 12px;
                font-size: clamp(0.65rem, 2vw, 0.72rem);
                min-height: 32px;
                margin-bottom: 8px;
            }

            .result-message {
                font-size: clamp(0.7rem, 2.2vw, 0.78rem);
                min-height: 2.2em;
            }

            .duration-info {
                margin-top: 10px;
                padding-top: 8px;
                font-size: clamp(0.6rem, 1.8vw, 0.7rem);
            }

            .duration-badge {
                font-size: clamp(0.6rem, 1.8vw, 0.7rem);
                min-height: 24px;
                padding: 2px 10px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 12px 10px 16px;
                border-radius: 18px;
            }

            .header {
                gap: 8px;
                margin-bottom: 14px;
            }

            .header-icon {
                width: 36px;
                height: 36px;
                font-size: 17px;
                border-radius: 12px;
            }

            .header-text h1 {
                font-size: 1rem;
            }

            .schedule-ref {
                padding: 8px 8px;
                margin-bottom: 14px;
            }

            .schedule-grid {
                gap: 4px;
            }

            .time-pill .value,
            .duration-pill .value {
                font-size: 0.65rem;
            }

            input[type="time"] {
                height: 44px;
                min-height: 40px;
                padding: 0 8px 0 38px;
                font-size: 0.85rem;
                border-radius: 12px;
            }

            .time-input-wrapper .input-icon {
                left: 10px;
                font-size: 14px;
            }

            .result-out-time {
                font-size: 1.8rem;
            }

            .result-card {
                padding: 10px 8px 10px;
            }
        }

        /* ── Landscape ── */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 8px 14px;
            }

            .card {
                padding: 12px 16px 16px;
                border-radius: 20px;
                max-width: 420px;
            }

            .header {
                margin-bottom: 10px;
            }
            .header-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .header-text h1 {
                font-size: 1.1rem;
            }

            .schedule-ref {
                padding: 6px 10px;
                margin-bottom: 10px;
                border-radius: 12px;
            }
            .schedule-ref-title {
                font-size: 0.5rem;
                margin-bottom: 4px;
            }
            .time-pill,
            .duration-pill {
                padding: 2px 2px;
            }
            .time-pill .value,
            .duration-pill .value {
                font-size: 0.65rem;
            }

            .input-section {
                margin-bottom: 10px;
            }
            .input-label {
                margin-bottom: 4px;
            }
            input[type="time"] {
                height: 40px;
                min-height: 36px;
                padding: 0 8px 0 36px;
                font-size: 0.85rem;
            }
            .time-input-wrapper .input-icon {
                left: 10px;
                font-size: 14px;
            }

            .result-card {
                padding: 10px 10px 8px;
                border-radius: 14px;
            }
            .result-out-time {
                font-size: 1.8rem;
                margin-bottom: 4px;
            }
            .status-badge {
                padding: 2px 10px;
                font-size: 0.6rem;
                min-height: 26px;
                margin-bottom: 6px;
            }
            .result-message {
                font-size: 0.65rem;
                min-height: 1.8em;
            }
            .duration-info {
                margin-top: 6px;
                padding-top: 6px;
                font-size: 0.6rem;
            }
            .footer {
                margin-top: 8px;
                font-size: 0.6rem;
            }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .footer .heart {
                animation: none;
            }
        }
    </style>
</head>
<body>

    <div class="card" role="main" aria-label="Time Keeper calculator">

        <!-- Header -->
        <div class="header">
            <div class="header-icon" aria-hidden="true">⏱️</div>
            <div class="header-text">
                <h1>Time Guard</h1>
                <p>Late today? Check your out time.</p>
            </div>
        </div>

        <!-- Standard Schedule (shows 8:15 AM & 5:00 PM) -->
        <!-- <div class="schedule-ref" aria-label="Standard shift schedule">
            <div class="schedule-ref-title">Standard Shift</div>
            <div class="schedule-grid">
                <div class="time-pill">
                    <div class="label">In</div>
                    <div class="value" id="stdInDisplay">8:15 AM</div>
                </div>
                <div class="schedule-arrow" aria-hidden="true">→</div>
                <div class="time-pill">
                    <div class="label">Out</div>
                    <div class="value" id="stdOutDisplay">5:00 PM</div>
                </div>
                <div class="duration-pill">
                    <div class="label">Total</div>
                    <div class="value" id="stdDurDisplay">8h 45m</div>
                </div>
            </div>
        </div> -->

        <!-- Input: Your Clock-In Time -->
        <div class="input-section">
            <div class="input-label">
                <span>Your Clock‑In Time</span>
                <span class="input-hint">24‑hr</span>
            </div>
            <div class="time-input-wrapper">
                <span class="input-icon" aria-hidden="true">🕐</span>
                <input
                type="time"
                id="clockInTime"
                aria-label="Enter your clock-in time"
                autocomplete="off"
                inputmode="numeric"
                />
            </div>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard" aria-live="polite">
            <div class="result-out-label">Required Clock‑Out</div>
            <div class="result-out-time placeholder" id="outTime">
                –:– –
            </div>
            <div id="statusBadge"></div>
            <div class="result-message" id="resultMessage">
                Enter your clock‑in time above.
            </div>
            <div class="duration-info" id="durationInfo" style="display: none;">
                <span>⏱ Work duration</span>
                <span class="duration-badge" id="totalDuration">8h 45m</span>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>Developed by <span class="dev">Sankha</span></span>
        <span class="heart" aria-label="with love">♥</span>
    </footer>

    <script>
        (function() {
            'use strict';

            // ─── Constants ───────────────────────────────────────────────
            const STD_IN_HOURS = 8;
            const STD_IN_MINUTES = 15;
            const STD_OUT_HOURS = 17;
            const STD_OUT_MINUTES = 0;

            const STD_IN_TOTAL = STD_IN_HOURS * 60 + STD_IN_MINUTES; // 495
            const STD_OUT_TOTAL = STD_OUT_HOURS * 60 + STD_OUT_MINUTES; // 1020
            const SHIFT_DURATION = STD_OUT_TOTAL - STD_IN_TOTAL; // 525

            // ─── DOM refs ──────────────────────────────────────────────
            const inputEl = document.getElementById('clockInTime');
            const resultCard = document.getElementById('resultCard');
            const outTimeEl = document.getElementById('outTime');
            const statusBadge = document.getElementById('statusBadge');
            const resultMsg = document.getElementById('resultMessage');
            const durationInfo = document.getElementById('durationInfo');
            const totalDurEl = document.getElementById('totalDuration');

            // Standard display refs
            const stdInDisplay = document.getElementById('stdInDisplay');
            const stdOutDisplay = document.getElementById('stdOutDisplay');
            const stdDurDisplay = document.getElementById('stdDurDisplay');

            // ─── Helpers ──────────────────────────────────────────────

            function to12hr(minutes) {
                const h24 = Math.floor(minutes / 60) % 24;
                const m = minutes % 60;
                const ampm = h24 >= 12 ? 'PM' : 'AM';
                const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
                return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
            }

            function formatDuration(totalMinutes) {
                if (totalMinutes === 0) return '0m';
                const h = Math.floor(totalMinutes / 60);
                const m = totalMinutes % 60;
                const parts = [];
                if (h > 0) parts.push(`${h}h`);
                if (m > 0) parts.push(`${m}m`);
                return parts.join(' ');
            }

            function parseTimeInput(value) {
                if (!value) return null;
                const parts = value.split(':');
                if (parts.length !== 2) return null;
                const h = parseInt(parts[0], 10);
                const m = parseInt(parts[1], 10);
                if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) return null;
                return h * 60 + m;
            }

            // ─── Core Calculation ──────────────────────────────────────

            function calculate() {
                const raw = inputEl.value;
                const inMinutes = parseTimeInput(raw);

                // ── No valid input ──
                if (inMinutes === null) {
                    resultCard.className = 'result-card';
                    outTimeEl.className = 'result-out-time placeholder';
                    outTimeEl.textContent = '–:– –';
                    statusBadge.innerHTML = '';
                    resultMsg.textContent = 'Enter your clock‑in time above.';
                    durationInfo.style.display = 'none';
                    return;
                }

                // ── Calculate ──
                const delay = Math.max(0, inMinutes - STD_IN_TOTAL);
                const outMinutes = STD_OUT_TOTAL + delay;
                const isLate = delay > 0;
                const outTimeStr = to12hr(outMinutes);

                // ── Update out time ──
                outTimeEl.className = `result-out-time ${isLate ? 'late' : 'on-time'}`;
                outTimeEl.textContent = outTimeStr;

                // ── Update card style ──
                resultCard.className = `result-card ${isLate ? 'late' : 'on-time'}`;

                // ── Status badge ──
                if (isLate) {
                    statusBadge.innerHTML =
                        `<span class="status-badge late">⏰ Late by ${formatDuration(delay)}</span>`;
                } else {
                    const earlyBy = STD_IN_TOTAL - inMinutes;
                    if (earlyBy > 0) {
                        statusBadge.innerHTML =
                            `<span class="status-badge on-time">✅ ${formatDuration(earlyBy)} early</span>`;
                    } else {
                        statusBadge.innerHTML =
                            `<span class="status-badge on-time">✅ On time</span>`;
                    }
                }

                // ── Friendly message ──
                if (isLate) {
                    resultMsg.textContent =
                        `You clocked in ${formatDuration(delay)} late — stay until ${outTimeStr} (${formatDuration(delay)} after 5:00 PM).`;
                } else if (inMinutes < STD_IN_TOTAL) {
                    const earlyBy = STD_IN_TOTAL - inMinutes;
                    resultMsg.textContent =
                        `You're ${formatDuration(earlyBy)} early — clock out at 5:00 PM.`;
                } else {
                    resultMsg.textContent =
                        `Right on schedule! Clock out at 5:00 PM.`;
                }

                // ── Duration info ──
                durationInfo.style.display = 'flex';
                totalDurEl.textContent = formatDuration(SHIFT_DURATION);
            }

            // ─── Init Standard Display ────────────────────────────────

            function initStandardDisplay() {
                stdInDisplay.textContent = to12hr(STD_IN_TOTAL);
                stdOutDisplay.textContent = to12hr(STD_OUT_TOTAL);
                stdDurDisplay.textContent = formatDuration(SHIFT_DURATION);
            }

            // ─── Event Listeners ──────────────────────────────────────

            inputEl.addEventListener('input', calculate);
            inputEl.addEventListener('change', calculate);

            // ─── Set default to current time ──────────────────────────

            function setCurrentTime() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                inputEl.value = `${hh}:${mm}`;
                calculate();
            }

            // ─── Boot ──────────────────────────────────────────────────

            function boot() {
                initStandardDisplay();
                // Use requestAnimationFrame to avoid layout thrash
                requestAnimationFrame(setCurrentTime);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', boot);
            } else {
                boot();
            }

            // ─── Refresh on visibility change ──────────────────────────
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && inputEl.value) {
                    calculate();
                }
            });

        })();
    </script>

</body>
</html>
